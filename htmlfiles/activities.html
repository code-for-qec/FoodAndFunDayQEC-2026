<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attractions & Activities - School Food & Fun Day!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Global CSS -->
    <link rel="stylesheet" href="../css/global.css" />
    <style>
        body {
            font-family: var(--font-body);
            background: radial-gradient(circle at top, var(--color-bg-medium) 0%, var(--color-bg-dark) 80%);
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
        }
    </style>
</head>
<body class="px-4 md:px-8 py-4">

    <!-- Call Navbar -->
    <div id="navbar"></div>

    <header class="pt-24 text-center mb-8 animate-fade-up">
        <div class="mb-4 inline-block relative">
            <div class="absolute inset-0 bg-[#dfb26b]/20 blur-lg rounded-full"></div>
            <img src="../icons and logos/QECLogoActivities.webp" alt="Queen Elizabeth College Logo" class="relative mx-auto h-24 w-auto hover:scale-105 transition-transform duration-300">
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-3 bg-clip-text text-transparent bg-gradient-to-r from-[#f1d89b] via-[#dfb26b] to-[#b88a44]">Fun Activities & Games</h1>
        <p class="text-[#a3b8b5] text-sm md:text-base max-w-xl mx-auto mb-4">Jump in the bouncy castle, test your mind in escape rooms, get facepainted, and enjoy carnival games!</p>
        <a href="../htmlfiles/index.html" class="btn-outline text-xs px-4 py-1.5">← Back to Main Page</a>
    </header>

    <!-- Search Input Area -->
    <div class="max-w-4xl mx-auto mb-8 px-4 animate-fade-up animate-delay-1">
        <div class="search-input-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search for games, rides, or services (e.g. Escape Room, Bouncy, Henna)..." />
            <svg class="search-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
    </div>

    <main class="max-w-5xl mx-auto space-y-8 px-4 mb-16">
        <div id="activitiesContainer" class="space-y-12 animate-fade-up animate-delay-2">
            <!-- Dynamically generated sections will go here -->
        </div>
        <div id="errorDetails" style="display: none;"></div>
        <div id="noResultsMessage" class="hidden text-center py-12 glass-panel">
            <p class="text-xl text-[#a3b8b5] font-['Outfit']">No activities match your search. 🔍</p>
            <button id="resetSearchBtn" class="btn-premium mt-4 text-xs py-2 px-6">Reset Search</button>
        </div>
    </main>

    <footer class="text-center py-8 text-[#a3b8b5] border-t border-[#dfb26b]/10 bg-[#071210]/40 max-w-full font-['Outfit'] text-xs">
        <p>&copy; 2026 Queen Elizabeth College. Crafted by QECC Club. All rights reserved.</p>
    </footer>

    <script>
        function formatFieldName(fieldName) {
            if (fieldName === 'team_members') return 'Team Members';
            if (fieldName === 'note') return 'Important Note';
            return fieldName
                .replace(/_/g, ' ')
                .replace(/([A-Z])/g, ' $1')
                .replace(/^./, str => str.toUpperCase());
        }

        function renderFieldValue(value) {
            if (Array.isArray(value)) {
                return value.join(', ');
            } else if (typeof value === 'object' && value !== null) {
                return JSON.stringify(value);
            } else {
                return value.toString();
            }
        }

        function renderProducts(products, sections) {
            let html = '';

            // Check if there are product sections (Beauty Parlour style)
            if (sections && sections.length > 0) {
                sections.forEach((section, index) => {
                    html += `
                        <div class="mb-4 last:mb-0">
                            <h5 class="font-bold text-xs tracking-wide text-[#dfb26b] uppercase mb-2 font-['Outfit']">${section.title}</h5>
                            <ul class="space-y-2">
                                ${section.items.map(item => `
                                    <li class="flex items-center justify-between py-1 border-b border-[#dfb26b]/5 last:border-0">
                                        <div class="flex items-center">
                                            <img src="../images/bulletpointcrown.png" alt="•" class="w-3.5 h-3.5 mr-2 flex-shrink-0 opacity-80" style="filter: brightness(1.2);">
                                            <span class="text-[#ede0cb] text-sm">${item.name}</span>
                                        </div>
                                        <span class="price-tag-gold text-xs">${item.price}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                });
            }
            // Fallback for flat products array
            else if (products && products.length > 0) {
                html += `
                    <div class="mb-2">
                        <ul class="space-y-2">
                            ${products.map(product => `
                                <li class="flex items-center justify-between py-1 border-b border-[#dfb26b]/5 last:border-0">
                                    <div class="flex items-center">
                                        <img src="../images/bulletpointcrown.png" alt="•" class="w-3.5 h-3.5 mr-2 flex-shrink-0 opacity-80" style="filter: brightness(1.2);">
                                        <span class="text-[#ede0cb] text-sm">${product.name}</span>
                                    </div>
                                    <span class="price-tag-gold text-xs">${product.price}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }
            return html;
        }

        let allActivities = [];

        function filterAndRenderActivities() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            const container = document.getElementById('activitiesContainer');
            const noResultsMessage = document.getElementById('noResultsMessage');

            // 1. Filter elements
            const filtered = allActivities.filter(stall => {
                if (searchQuery !== '') {
                    const matchName = stall.name.toLowerCase().includes(searchQuery);
                    const matchSection = stall.section && stall.section.toLowerCase().includes(searchQuery);
                    const matchNote = stall.note && stall.note.toLowerCase().includes(searchQuery);
                    
                    let matchMenu = false;
                    if (stall.products) {
                        matchMenu = stall.products.some(p => p.name.toLowerCase().includes(searchQuery));
                    }
                    if (!matchMenu && stall.sections) {
                        matchMenu = stall.sections.some(s => {
                            if (s.title.toLowerCase().includes(searchQuery)) return true;
                            return s.items && s.items.some(i => i.name.toLowerCase().includes(searchQuery));
                        });
                    }
                    
                    return matchName || matchSection || matchNote || matchMenu;
                }
                return true;
            });

            // 2. Handle Empty Results
            if (filtered.length === 0) {
                container.classList.add('hidden');
                noResultsMessage.classList.remove('hidden');
                return;
            } else {
                container.classList.remove('hidden');
                noResultsMessage.classList.add('hidden');
            }

            // 3. Re-group by section for rendering
            const grouped = filtered.reduce((acc, stall) => {
                const sec = stall.section || 'Other Activities';
                if (!acc[sec]) acc[sec] = [];
                acc[sec].push(stall);
                return acc;
            }, {});

            const sortedSections = Object.keys(grouped).sort();

            // Clear and Render
            container.innerHTML = '';
            sortedSections.forEach(secName => {
                const secActivities = grouped[secName];

                // Create Section Header
                const secHeader = document.createElement('div');
                secHeader.className = 'border-b border-[#dfb26b]/20 pb-2 mb-6 mt-4';
                secHeader.innerHTML = `<h2 class="text-2xl md:text-3xl font-extrabold text-[#dfb26b] font-['Outfit']">${secName}</h2>`;
                container.appendChild(secHeader);

                // Create Section Grid
                const secGrid = document.createElement('div');
                secGrid.className = 'grid gap-6 md:grid-cols-2';

                secActivities.forEach((stall, idx) => {
                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-2xl p-6 flex flex-col justify-between hover:scale-[1.02] transition-all duration-300 animate-fade-up';
                    card.style.animationDelay = `${idx * 0.05}s`;

                    let html = `<div>`;
                    
                    // Render image if available
                    if (stall.image) {
                        let style = '';
                        if (stall.image_position) style = `object-position: ${stall.image_position};`;
                        html += `<img src="${stall.image}" alt="${stall.name}" class="w-full h-44 object-cover rounded-xl mb-4 border border-[#dfb26b]/15" style="${style}">`;
                    }

                    html += `
                        <h3 class="text-2xl font-bold tracking-tight text-[#dfb26b] font-['Outfit'] mb-3">${stall.name}</h3>
                        <div class="space-y-4">
                    `;

                    // Render services/prices
                    if ((stall.products && stall.products.length > 0) || (stall.sections && stall.sections.length > 0)) {
                        html += renderProducts(stall.products, stall.sections);
                    }

                    // Render notes or other keys
                    Object.entries(stall).forEach(([field, value]) => {
                        if (['name', 'products', 'sections', 'section', 'location', 'time', 'image', 'image_position'].includes(field)) return;
                        if (!value || (Array.isArray(value) && value.length === 0) || value === '') return;
                        
                        html += `
                            <div class="mt-3 p-3 bg-[#071210]/40 rounded-lg border border-[#dfb26b]/10 text-xs">
                                <h5 class="font-bold text-[#dfb26b] uppercase mb-1 font-['Outfit']">${formatFieldName(field)}</h5>
                                <p class="text-[#a3b8b5] leading-relaxed">${renderFieldValue(value)}</p>
                            </div>
                        `;
                    });

                    html += `
                            </div>
                        </div>
                        
                        <!-- Metadata footer -->
                        <div class="mt-6 pt-4 border-t border-[#dfb26b]/10 flex flex-wrap justify-between items-center text-xs text-[#a3b8b5] gap-2 font-['Outfit']">
                            <div>
                                <span class="font-bold text-[#dfb26b]">🕒 Time:</span> 
                                <span>${stall.time || 'TBD'}</span>
                            </div>
                            <div>
                                <span class="font-bold text-[#dfb26b]">📍 Location:</span> 
                                <span>${stall.location || 'TBD'}</span>
                            </div>
                        </div>
                    `;

                    card.innerHTML = html;
                    secGrid.appendChild(card);
                });

                container.appendChild(secGrid);
            });
        }

        async function loadStalls() {
            const errorDetails = document.getElementById('errorDetails');
            try {
                const response = await fetch('stall_info.json?' + new Date().getTime(), {
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const stalls = await response.json();
                const FoodStalls = [
                    'Pain Fourré', 'Chips', 'Fried Noodles', 'Ti Puri and Curry',
                    'Juice (Panacon), Soft Drinks and Alouda', 'Ice Cream', 'La Boutik Sinwa', 'Pastries'
                ];

                // Filter out food stalls
                allActivities = stalls.filter(stall => !FoodStalls.includes(stall.name));

                // Load initial layout
                filterAndRenderActivities();

            } catch (error) {
                console.error('Error loading activity information:', error);
                errorDetails.style.display = 'block';
                errorDetails.innerHTML = `Error loading activity information:\n${error.message}\n\nPlease check that stall_info.json is present and valid.`;

                document.getElementById('activitiesContainer').innerHTML = `
                    <div class="text-center p-8 glass-panel border-red-500/20">
                        <p class="text-lg text-red-400 font-['Outfit']">Unable to load activity lists at this time. Please try refreshing.</p>
                    </div>
                `;
            }
        }

        // Setup Search and reset listeners
        window.addEventListener('load', () => {
            loadStalls().then(() => {
                document.getElementById('searchInput').addEventListener('input', filterAndRenderActivities);
                document.getElementById('resetSearchBtn').addEventListener('click', () => {
                    document.getElementById('searchInput').value = '';
                    filterAndRenderActivities();
                });
            });
        });
    </script>
    <script src="../javascript/navbar.js"></script>
</body>
</html>
